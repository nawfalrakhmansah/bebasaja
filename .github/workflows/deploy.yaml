deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: DeployAja Plan
        uses: deployaja/deployaja-cli@v0.0.10
        with:
          command: plan
          api-token: ${{ secrets.DEPLOYAJA_TOKEN }}
          # TAMBAHKAN BARIS INI:
          config-file: deployaja.yaml
          
      - name: DeployAja Deploy
        uses: deployaja/deployaja-cli@v0.0.10
        with:
          command: deploy
          api-token: ${{ secrets.DEPLOYAJA_TOKEN }}
          # TAMBAHKAN BARIS INI JUGA:
          config-file: deployaja.yaml
          additional-args: --set container.image=${{ env.GH_REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          
      - name: DeployAja Status
        uses: deployaja/deployaja-cli@v0.0.10
        with:
          command: status
          api-token: ${{ secrets.DEPLOYAJA_TOKEN }}
          # DAN INI JUGA:
          config-file: deployaja.yaml
